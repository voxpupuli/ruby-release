---
name: Gem Release

on:
  push:
    tags:
      - '*'

permissions: {}

jobs:
  create-github-release:
    name: Create GitHub release
    runs-on: ubuntu-24.04
    permissions:
      contents: write # create release
    steps:
      - name: Create Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create --repo ${{ github.repository }} ${{ github.ref_name }} --generate-notes
